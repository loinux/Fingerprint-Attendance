<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fingerprint Attendance System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;min-height:100vh;padding:30px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.title{font-size:28px;font-weight:600;}
.btn{padding:10px 18px;border:none;border-radius:10px;cursor:pointer;margin-left:10px;font-weight:500;}
.green{background:#28a745;color:#fff;}
.blue{background:#007bff;color:#fff;}
.orange{background:#ff9800;color:#fff;}
.card{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);margin-bottom:25px;}
.table{width:100%;border-collapse:collapse;}
.table th,.table td{padding:12px;text-align:left;}
.table th{background:rgba(0,0,0,0.3);}
.table tr{border-bottom:1px solid rgba(255,255,255,0.1);}
.input-group{margin-bottom:15px;}
.input-group label{display:block;margin-bottom:5px;}
.input-group input{width:100%;padding:10px;border:none;border-radius:8px;outline:none;}
.center{text-align:center;}
.footer{text-align:center;opacity:0.7;}
</style>

</head>

<body>

<div class="header">
  <div class="title">Fingerprint Attendance System</div>
  <div>
    <button class="btn green" onclick="enrollFinger()">Enroll</button>
    <button class="btn orange" onclick="scanFinger()">Scan</button>
    <button class="btn blue" onclick="downloadCSV()">Download CSV</button>
    <button class="btn blue" onclick="monthlyReport()">Monthly Report</button>
  </div>
</div>

<div class="card">
  <table class="table" id="attendanceTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="card">
  <h3>Add User</h3><br>

  <div class="input-group">
    <label>Fingerprint ID</label>
    <input type="number" id="fid" placeholder="Enter ID">
  </div>

  <div class="input-group">
    <label>Name</label>
    <input type="text" id="name" placeholder="Enter Name">
  </div>

  <div class="center">
    <button class="btn green" onclick="saveUser()">Save User</button>
  </div>
</div>

<div class="footer">Cloud Attendance System</div>

<script>

// ================= CONFIG =================
<script>

// ================= CONFIG =================
const ESP_IP = "http://192.168.1.200"; // ✅ your ESP IP

const GITHUB_ATT = "https://raw.githubusercontent.com/adarsha8984/attendance/main/data/attendance.json";
const GITHUB_USERS = "https://raw.githubusercontent.com/adarsha8984/attendance/main/data/users.json";

// ================= LOAD DATA =================
async function loadAttendance(){
  try{
    let attRes = await fetch(GITHUB_ATT + "?t=" + new Date().getTime());
    let attendance = await attRes.json();

    let userRes = await fetch(GITHUB_USERS + "?t=" + new Date().getTime());
    let users = await userRes.json();

    let table = document.getElementById("attendanceTable").getElementsByTagName('tbody')[0];
    table.innerHTML = "";

    attendance.forEach(e => {
      let name = "Unknown";
      let user = users.find(u => u.id == e.id);
      if(user) name = user.name;

      let row = table.insertRow();

      let t = new Date(e.time);
      let status = "On Time";

      if(t.getHours() > 9 || (t.getHours()==9 && t.getMinutes()>30)){
        status = "Late";
      }

      row.insertCell(0).innerText = e.id;
      row.insertCell(1).innerText = name;
      row.insertCell(2).innerText = t.toLocaleString();
      row.insertCell(3).innerText = status;
    });

  }catch(err){
    console.log("Load error:", err);
  }
}

// ================= ENROLL =================
function enrollFinger(){
  let id = document.getElementById("fid").value;

  if(!id){
    alert("Enter ID");
    return;
  }

  fetch(`${ESP_IP}/enroll?id=${id}`)
  .then(() => alert("Place finger twice for ID " + id))
  .catch(() => alert("ESP not reachable"));
}

// ================= SAVE USER =================
function saveUser(){
  let id = document.getElementById("fid").value;
  let name = document.getElementById("name").value;

  if(!id || !name){
    alert("Enter ID and Name");
    return;
  }

  fetch(`${ESP_IP}/adduser?id=${id}&name=${name}`)
  .then(res => res.text())
  .then(msg => {
    alert(msg || "User Saved");
  })
  .catch(err => {
    alert("❌ ESP not reachable / CORS blocked");
    console.log(err);
  });
}

// ================= SCAN =================
function scanFinger(){
  fetch(`${ESP_IP}/scan`)
  .then(res => res.text())
  .then(id => {

    if(parseInt(id) > 0){
      alert("Scan Success ID: " + id);
      loadAttendance();
    } else {
      alert("Finger not recognized");
    }

  })
  .catch(() => alert("ESP not reachable"));
}

// ================= CSV DOWNLOAD =================
function downloadCSV() {
  let rows = [["ID","Name","Time","Status"]];
  let table = document.getElementById("attendanceTable");

  for (let i = 1; i < table.rows.length; i++) {
    let cols = [];
    for (let j = 0; j < table.rows[i].cells.length; j++) {
      cols.push(table.rows[i].cells[j].innerText);
    }
    rows.push(cols);
  }

  let csv = rows.map(r => r.join(",")).join("\n");
  let blob = new Blob([csv], { type: "text/csv" });

  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "attendance.csv";
  link.click();
}

// ================= MONTHLY REPORT =================
async function monthlyReport(){
  let data = await fetch(GITHUB_ATT).then(res => res.json());
  let users = await fetch(GITHUB_USERS).then(res => res.json());

  let now = new Date();
  let month = now.getMonth();
  let year = now.getFullYear();

  let rows = [["ID","Name","Date","Time","Status"]];

  data.forEach(e => {
    let d = new Date(e.time);

    if(d.getMonth()==month && d.getFullYear()==year){

      let user = users.find(u => u.id == e.id);
      let name = user ? user.name : "Unknown";

      let status = "On Time";
      if(d.getHours() > 9 || (d.getHours()==9 && d.getMinutes()>30)){
        status = "Late";
      }

      rows.push([
        e.id,
        name,
        d.toLocaleDateString(),
        d.toLocaleTimeString(),
        status
      ]);
    }
  });

  let csv = rows.map(r => r.join(",")).join("\n");
  let blob = new Blob([csv], { type: "text/csv" });

  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "Monthly_Report.csv";
  link.click();
}

// ================= AUTO REFRESH =================
setInterval(loadAttendance, 5000);
loadAttendance();

</script>
</body>
</html>
